name: Run OSINT Bot

on:
  workflow_dispatch: # Ручной запуск кнопкой

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Bot with Timeout
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        # Разрешаем запуск устаревших экшенов, если гитхаб ругается на Node
        ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
      # timeout-minutes не даст гитхабу выдать аварийный exit code 1 при долгой работе
      timeout-minutes: 30 
      run: |
        echo "Запуск OSINT бота..."
        python bot.py
